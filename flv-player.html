<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>PantauJalan · FLV Viewer</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden;
                 font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    #err, #info {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #E0E6ED; font-size: 14px; text-align: center; padding: 16px 20px;
      background: rgba(12, 18, 32, 0.9); border: 1px solid #1E2A40; border-radius: 6px;
      max-width: 84vw;
    }
    #err { color: #FF3366; display: none; }
    #info { color: #9CA3AF; }
    h2 { color: #00D9FF; font-size: 14px; margin: 0 0 8px 0; letter-spacing: 0.08em; }
    a { color: #00D9FF; }
    .hint { color: #6B7280; font-size: 11px; margin-top: 8px; }
    button.retry { background: #00D9FF; color: #05080F; border: none;
                   padding: 8px 16px; font-weight: bold; cursor: pointer;
                   font-family: monospace; letter-spacing: 0.08em;
                   margin-top: 10px; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="wrap">
    <video id="v" controls autoplay muted playsinline></video>
    <div id="info"><h2>LOADING STREAM…</h2>Connecting to the FLV feed
      <div class="hint" id="attempt">attempt 1</div>
    </div>
    <div id="err"><h2>STREAM UNAVAILABLE</h2>
      <span id="errmsg">Could not play this feed.</span><br>
      <button class="retry" id="btnRetry">RETRY</button>
    </div>
  </div>

  <!-- Self-hosted flv.js (jsdelivr sometimes slow on ID ISPs). -->
  <script src="./flv.min.js"></script>
  <script>
    // Thin wrapper that plays an HTTP-FLV live stream inside a WebView.
    // PantauJalan points its WEB-type feed URLs here with the raw .flv URL
    // in `?s=` and a human name in `?n=`. For CCTV streams we assume:
    //   * no audio track
    //   * occasional brief network jitter (mobile data)
    //   * server may reject first connect and accept second
    //
    // Strategy: enable stash buffer (absorbs jitter), disable audio track
    // request, and auto-retry once after a short delay before surfacing
    // the error UI. Manual retry button is always available.

    (function () {
      var qs = new URLSearchParams(window.location.search);
      var streamUrl = qs.get('s');
      var name = qs.get('n') || 'CCTV';
      document.title = 'PantauJalan · ' + name;

      var $info = document.getElementById('info');
      var $err  = document.getElementById('err');
      var $msg  = document.getElementById('errmsg');
      var $v    = document.getElementById('v');
      var $attempt = document.getElementById('attempt');
      var $btnRetry = document.getElementById('btnRetry');

      var player = null;
      var attempt = 0;
      var autoRetries = 2;   // total attempts including the first
      var autoRetryDelay = 2500;  // ms before each auto retry

      function showLoading() {
        $err.style.display = 'none';
        $info.style.display = 'block';
        $attempt.textContent = 'attempt ' + (attempt + 1);
      }

      function showError(msg) {
        $info.style.display = 'none';
        $err.style.display = 'block';
        $msg.textContent = msg || 'Could not play this feed.';
      }

      function destroyPlayer() {
        if (!player) return;
        try { player.pause(); } catch (e) {}
        try { player.unload(); } catch (e) {}
        try { player.detachMediaElement(); } catch (e) {}
        try { player.destroy(); } catch (e) {}
        player = null;
      }

      function start() {
        attempt++;
        showLoading();
        destroyPlayer();

        if (!streamUrl) { showError('Missing ?s=<flv-url>'); return; }

        if (typeof flvjs === 'undefined') {
          showError('flv.js failed to load. Check network/ad-block and tap RETRY.');
          return;
        }
        if (!flvjs.isSupported()) {
          showError('This WebView lacks MediaSource Extensions — FLV cannot play here. Needs Android System WebView or iOS 17.1+.');
          return;
        }

        player = flvjs.createPlayer({
          type: 'flv',
          isLive: true,
          cors: true,
          hasAudio: false,   // CCTV feeds are video-only; declaring audio
                             // that never arrives makes flv.js hang waiting.
          hasVideo: true,
          url: streamUrl
        }, {
          enableWorker: false,
          enableStashBuffer: true,   // ride small network jitters
          stashInitialSize: 384,     // ~small KB prebuffer
          autoCleanupSourceBuffer: true,
          autoCleanupMaxBackwardDuration: 12,
          autoCleanupMinBackwardDuration: 6,
          lazyLoad: false,
          reuseRedirectedURL: true
        });

        player.attachMediaElement($v);

        player.on(flvjs.Events.ERROR, function (type, details) {
          console.warn('[flv] error', type, details);
          if (attempt < autoRetries) {
            // Try once more before giving up.
            setTimeout(start, autoRetryDelay);
          } else {
            showError('Stream error: ' + details + ' (attempt ' + attempt + ')');
          }
        });

        $v.addEventListener('playing', function () {
          // Stream started — hide spinner.
          $info.style.display = 'none';
          $err.style.display = 'none';
        }, { once: false });

        try {
          player.load();
          var p = player.play();
          if (p && typeof p.catch === 'function') {
            p.catch(function (e) {
              // muted+playsinline should let autoplay succeed; if not,
              // the user can tap the video to start.
              console.warn('autoplay blocked:', e);
            });
          }
        } catch (e) {
          if (attempt < autoRetries) setTimeout(start, autoRetryDelay);
          else showError(String(e));
        }
      }

      $btnRetry.addEventListener('click', function () {
        attempt = 0;   // reset auto-retry budget on manual retry
        start();
      });

      start();
    })();
  </script>
</body>
</html>

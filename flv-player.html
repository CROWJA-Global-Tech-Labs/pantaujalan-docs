<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>PantauJalan · FLV Viewer</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden;
                 font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    #err, #info {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #E0E6ED; font-size: 14px; text-align: center; padding: 16px 20px;
      background: rgba(12, 18, 32, 0.9); border: 1px solid #1E2A40; border-radius: 6px;
      max-width: 84vw;
    }
    #err { color: #FF3366; display: none; }
    #info { color: #9CA3AF; }
    h2 { color: #00D9FF; font-size: 14px; margin: 0 0 8px 0; letter-spacing: 0.08em; }
    a { color: #00D9FF; }
  </style>
</head>
<body>
  <div id="wrap">
    <video id="v" controls autoplay muted playsinline></video>
    <div id="info"><h2>LOADING STREAM…</h2>Connecting to the FLV feed</div>
    <div id="err"><h2>STREAM UNAVAILABLE</h2>
      <span id="errmsg">Could not play this feed.</span><br><br>
      <a id="direct" href="#" target="_blank" rel="noopener">Open raw .flv ▶</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
  <script>
    // This page is a thin wrapper that plays an HTTP-FLV live stream
    // inside a WebView. PantauJalan points its WEB-type feed URLs here
    // with the raw .flv URL carried in the `s` query param. Title (for
    // the <title> bar) comes in `n`.
    //
    // Used for portals that only serve FLV — notably Surakarta ATCS.
    // ExoPlayer / AVPlayer can't decode FLV natively, so we offload to
    // flv.js running inside WebView, which remuxes FLV → fMP4 via MSE.

    (function () {
      var qs = new URLSearchParams(window.location.search);
      var streamUrl = qs.get('s');
      var name = qs.get('n') || 'CCTV';
      document.title = 'PantauJalan · ' + name;

      var $info = document.getElementById('info');
      var $err  = document.getElementById('err');
      var $msg  = document.getElementById('errmsg');
      var $v    = document.getElementById('v');
      var $dir  = document.getElementById('direct');

      function fail(msg) {
        $info.style.display = 'none';
        $msg.textContent = msg || 'Could not play this feed.';
        if (streamUrl) $dir.href = streamUrl;
        $err.style.display = 'block';
      }

      if (!streamUrl) { fail('Missing ?s=<flv-url>'); return; }

      if (typeof flvjs === 'undefined' || !flvjs.isSupported()) {
        // Fall back to the video element's native player; will fail on
        // most browsers for FLV but worth a shot.
        $v.src = streamUrl;
        $v.addEventListener('error', function () {
          fail('Your browser does not support MediaSource Extensions, so FLV streams cannot play. Open the raw link in a desktop browser with flv.js, or use the direct FLV URL in VLC.');
        });
        return;
      }

      var player = flvjs.createPlayer({
        type: 'flv',
        isLive: true,
        cors: true,
        hasAudio: true,
        hasVideo: true,
        url: streamUrl
      }, {
        enableWorker: false,
        enableStashBuffer: false,  // low-latency for live
        stashInitialSize: 128,
        autoCleanupSourceBuffer: true,
        lazyLoad: false
      });

      player.attachMediaElement($v);

      player.on(flvjs.Events.ERROR, function (type, details) {
        fail('Stream error: ' + type + ' / ' + details);
      });

      $v.addEventListener('playing', function () { $info.style.display = 'none'; });

      try {
        player.load();
        var p = player.play();
        if (p && typeof p.catch === 'function') {
          p.catch(function (e) {
            // Autoplay with sound is usually blocked; we set `muted` on
            // the element so this rarely fires, but if it does fall back
            // gracefully.
            console.warn('autoplay blocked:', e);
          });
        }
      } catch (e) {
        fail(String(e));
      }
    })();
  </script>
</body>
</html>
